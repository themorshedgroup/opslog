    // ── Thread updates
    const addUpdate = (taskId, content) => {
      if (!content.trim()) return;
      const nextThreads = { ...threads };
      if (!nextThreads[taskId]) nextThreads[taskId] = { messages: [] };
      nextThreads[taskId].messages.push({ id: uid(), content, timestamp: now(), source: 'user' });
      setThreads(nextThreads); setThreadInput('');
      refreshThreadSummary(taskId, nextThreads); // background — no await
    };

    const handleThreadAssist = async (text) => {
      if (!text.trim() || !apiKey) return;
      const taskId = activeThread;
      const task   = tasks[taskId];
      // 1. Log user message immediately
      const withUser = { ...threads };
      if (!withUser[taskId]) withUser[taskId] = { messages: [] };
      withUser[taskId] = { ...withUser[taskId], messages: [...withUser[taskId].messages, { id: uid(), content: text, timestamp: now(), source: 'user' }] };
      setThreads(withUser);
      setThreadInput('');
      setThreadAiLoading(true);
      try {
        const sysPrompt = `You are OpsLog AI assisting with a specific task. Be concise and practical.\nTask: "${task.title}" | Status: ${task.status} | Due: ${task.dueDate||'none'} | Category: ${getCatLabel(task.category)}\nNotes: ${task.notes||'none'}\nDecision question: ${task.decisionQuestion||'none'}\nOptions: ${task.decisionOptions||'none'}`;
        const history = (withUser[taskId]?.messages||[]).slice(-10).map(m => ({
          role: m.source === 'ai' ? 'assistant' : 'user',
          content: m.content
        }));
        const aiText = await callAI(history, sysPrompt);
        const clean  = aiText.replace(/ACTION:\{[\s\S]*?\}(?:\s*$)/m, '').trim();
        // 2. Log AI reply
        const withAi = { ...withUser };
        withAi[taskId] = { ...withAi[taskId], messages: [...withAi[taskId].messages, { id: uid(), content: clean, timestamp: now(), source: 'ai' }] };
        setThreads(withAi);
        refreshThreadSummary(taskId, withAi);
      } catch(e) {
        const withErr = { ...withUser };
        withErr[taskId] = { ...withErr[taskId], messages: [...withErr[taskId].messages, { id: uid(), content: `Error: ${e.message}`, timestamp: now(), source: 'ai' }] };
        setThreads(withErr);
      } finally {
        setThreadAiLoading(false);
      }
    };

    // ── Category settings
    const saveCategories = (newCats) => {
      const nextTasks = { ...tasks };
      const validIds  = newCats.map(c => c.id);
      const fallbackId = newCats[0]?.id;
      Object.keys(nextTasks).forEach(id => {
        if (!validIds.includes(nextTasks[id].category)) nextTasks[id] = { ...nextTasks[id], category: fallbackId };
      });
      setCategories(newCats); setTasks(nextTasks); setShowCatSettings(false);
    };

    const handleCopy = async (id, content) => {
      await copyText(stripMd(content)); setCopiedId(id); setTimeout(() => setCopiedId(null), 2000);
    };

    const saveApiKey = () => { const t = apiKeyDraft.trim(); ls.set('ol-key', t); setApiKey(t); };

    // ─────────────────────────────────────────────────────────────────────────────
    // RENDER TABS
    // ─────────────────────────────────────────────────────────────────────────────

    const renderChat = () => (
      <div className="chat-wrap">
        {!apiKey && (
          <div className="no-key-banner">
            <strong>⚠️ API key not set.</strong> Go to <strong>Settings</strong> and paste your Anthropic API key to enable AI.
          </div>
        )}
        <div className="chat-messages">
          {chatHistory.length === 0 && <div className="chat-msg sys">Ready. Use the pills below or type anything.</div>}
          {chatHistory.map((m, i) => {
            const displayText = m._show || m.content;
            const isEmail = m.role === 'assistant' && /subject\s*:/i.test(displayText);
            const gmailUrl = () => {
              const subMatch = displayText.match(/subject\s*:\s*(.+)/i);
              const su = subMatch ? subMatch[1].trim() : '';
              const body = displayText.replace(/subject\s*:.*\n?/i, '').trim();
              return `https://mail.google.com/mail/?view=cm&fs=1&su=${encodeURIComponent(su)}&body=${encodeURIComponent(body)}`;
            };
            return (
              <div key={i} className={`chat-msg ${m.role === 'user' ? 'user' : 'ai'}`}>
                <span className="fmt" dangerouslySetInnerHTML={{ __html: fmtHtml(displayText) }}/>
                {isEmail && (
                  <div><button className="gmail-chat-btn" onClick={() => window.open(gmailUrl(), '_blank')}>📧 Open in Gmail</button></div>
                )}
              </div>
            );
          })}
          {aiLoading && <div className="chat-msg ai"><div className="typing-dots"><span/><span/><span/></div></div>}
          <div ref={chatEndRef}/>
        </div>
        <div className="chat-input-area">
          {agendaState?.step === 'asked' && <div className="eod-banner agenda-banner">📋 Agenda active — reply with numbered answers (1. ... 2. ...)</div>}
          {eodState?.step === 'asked' && <div className="eod-banner">📊 {eodState.target === 'tarek' ? 'EOD: Tarek' : 'EOD: Symon'} — reply with numbered answers (1. ... 2. ...)</div>}
          {updateTaskState?.step === 'picking' && <div className="update-banner">✏️ Update Mode — reply with the number of the thread to update</div>}
          <div className="pills">
            <button className="pill accomplish-pill" onClick={() => setChatInput('Accomplishment: ')}>🏆 Accomplishments</button>
            <button className="pill" onClick={() => setChatInput('Add task: ')}>＋ Add Task</button>
            <button className="pill" onClick={() => setChatInput('Update task: ')}>✏️ Update Task</button>
            <button className="pill agenda-pill" onClick={startAgenda} disabled={aiLoading}>📋 Agenda</button>
            <button className="pill eod-pill" onClick={() => startEod('tarek')} disabled={aiLoading}>📊 EOD: Tarek</button>
            <button className="pill eod-pill eod-symon-pill" onClick={() => startEod('symon')} disabled={aiLoading}>📊 EOD: Symon</button>
            <button className="pill" onClick={() => { if (window.confirm('Clear chat history?')) setChatHistory([]); }}>🗑️ Clear Chat</button>
          </div>
          <div className="chat-row">
            <textarea
              ref={chatTextareaRef}
              className="chat-textarea"
              value={chatInput}
              onChange={e => setChatInput(e.target.value)}
              placeholder={agendaState?.step === 'asked' ? 'Type numbered answers...' : eodState?.step === 'asked' ? 'Type numbered updates...' : updateTaskState?.step === 'picking' ? 'Reply with a number...' : 'Type a task or message...'}
              rows={1}
              onKeyDown={e => { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendChat(chatInput); } }}
            />
            {speechSupported && (
              <button className={`mic-btn ${isListening ? 'listening' : ''}`} onClick={toggleVoice} title="Voice input">🎤</button>
            )}
            <button className="send-btn" onClick={() => sendChat(chatInput)} disabled={aiLoading || !chatInput.trim()}>↑</button>
          </div>
        </div>
      </div>
    );

    const renderBoard = () => {
      const allTasks = Object.values(tasks);
      return (
        <div className="board">
          <div className="board-toolbar">
            <button className="board-add-btn" onClick={() => setEditTask(newTaskTemplate())}>+ Add Task Manually</button>
            <button className="board-settings-btn" onClick={() => setShowCatSettings(true)} title="Edit categories">⚙️</button>
          </div>
          {categories.map(col => {
            const colTasks = allTasks
              .filter(t => t.category === col.id)
              .sort((a, b) => new Date(a.dueDate||'9999-12-31') - new Date(b.dueDate||'9999-12-31'));
            const collapsed = collapsedCols[col.id];
            return (
              <div key={col.id} className="column">
                <div className="col-header" style={{ borderLeftColor: col.color, borderLeftWidth: 4, borderLeftStyle: 'solid' }}
                  onClick={() => setCollapsedCols(p => ({ ...p, [col.id]: !p[col.id] }))}>
                  <div className="col-header-left">
                    <div className="col-dot" style={{ background: col.color }}/>
                    <span className="col-label">{col.label}</span>
                  </div>
                  <div style={{ display: 'flex', gap: 8, alignItems: 'center' }}>
                    <span className="col-count">{colTasks.length}</span>
                    <span className="col-chevron">{collapsed ? '▼' : '▲'}</span>
                  </div>
                </div>
                {!collapsed && (
                  <div className="task-list">
                    {colTasks.length === 0
                      ? <div className="col-empty">No tasks</div>
                      : colTasks.map(task => (
                          <div key={task.id} className="task-card" onClick={() => setEditTask({ ...task, _exists: true })}>
                            <div className="task-card-top">
                              <div className="task-title">{task.title}</div>
                              <span className={`status-chip ${task.status}`}>{STATUS_OPTIONS.find(s=>s.value===task.status)?.label||task.status}</span>
                            </div>
                            <div className="task-meta">
                              {task.dueDate
                                ? <span className={`due-badge ${isOverdue(task.dueDate, task.status) ? 'overdue' : ''}`}>
                                    📅 {fmtDate(task.dueDate)}{isOverdue(task.dueDate, task.status) ? ' ⚠️' : ''}
                                  </span>
                                : <span className="due-badge overdue">⚠️ No due date</span>
                              }
                              {threads[task.id]?.messages?.length > 0 && (
                                <span style={{ fontSize: 11, color: 'var(--text2)' }}>🧵 {threads[task.id].messages.length}</span>
                              )}
                            </div>
                          </div>
                        ))
                    }
                  </div>
                )}
              </div>
            );
          })}
        </div>
      );
    };

    const renderThreads = () => {
      if (activeThread) {
        const task = tasks[activeThread];
        if (!task) { setActiveThread(null); return null; }
        const thread = threads[activeThread] || { messages: [] };
        const col    = categories.find(c => c.id === task.category);
        return (
          <div className="thread-view-wrap">
            <div className="thread-scrollable">
            <div className="thread-view-hdr">
              <button className="back-btn" onClick={() => setActiveThread(null)}>←</button>
              <div className="thread-view-info">
                <div className="thread-view-title">{task.title}</div>
                <div className="thread-view-sub">
                  {task.dueDate ? `Due ${fmtDate(task.dueDate)}` : 'No due date'}
                  <span>·</span>
                  <span className={`status-chip ${task.status}`} style={{ fontSize: 10 }}>{STATUS_OPTIONS.find(s=>s.value===task.status)?.label||task.status}</span>
                  {col && <><span>·</span><span style={{ color: col.color, fontWeight: 600 }}>{col.label}</span></>}
                </div>
              </div>
              <button className="icon-btn" onClick={() => { setShowDecisionModal(true); suggestDecisionOptions(task); }} title="Quick Decision">🔮</button>
              <button className="icon-btn" onClick={() => setEditTask({ ...task, _exists: true })} title="Edit task">✏️</button>
            </div>
            <div className="thread-summary-block">
              <div className="thread-summary-hdr">
                <span>📋 Overview</span>
                <button className="refresh-btn" onClick={() => refreshThreadSummary(activeThread, threads)} disabled={summarizing || !apiKey}>
                  {summarizing ? '...' : '↻ Refresh'}
                </button>
              </div>
              {summarizing
                ? <div className="thread-summary-empty">Generating summary...</div>
                : thread.summary
                  ? <div className="thread-summary-text">{thread.summary}</div>
                  : <div className="thread-summary-empty">No summary yet — add an update or tap ↻ Refresh.</div>
              }
            </div>
            <div className="decision-block" ref={decisionBlockRef}>
              <div className="decision-block-hdr">
                <span>🔮 Decision</span>
                <button className="decision-suggest-btn" onClick={() => suggestDecisionOptions(task)} disabled={decisionDraftLoading}>
                  {decisionDraftLoading ? '...' : '✨ AI Suggest'}
                </button>
              </div>
              {task.decisionQuestion
                ? <div className="decision-question">{task.decisionQuestion}</div>
                : <div className="decision-empty">No question set — add one in the task.</div>
              }
              {decisionDraft !== null
                ? <>
                    {decisionDraftQuestion && (
                      <label className="decision-checkbox-item" style={{ marginBottom: 10, paddingBottom: 10, borderBottom: '1px solid var(--border)' }}>
                        <input type="checkbox" checked={decisionDraftQuestion.use}
                          onChange={() => setDecisionDraftQuestion(prev => ({ ...prev, use: !prev.use }))}/>
                        <span><strong style={{ color: '#8b5cf6' }}>Question: </strong>{decisionDraftQuestion.text}</span>
                      </label>
                    )}
                    <div className="decision-checkbox-list">
                      {(Array.isArray(decisionDraft) ? decisionDraft : []).map((item, i) => (
                        <label key={i} className="decision-checkbox-item">
                          <input type="checkbox" checked={item.checked}
                            onChange={() => setDecisionDraft(prev => prev.map((it,idx) => idx===i ? {...it, checked: !it.checked} : it))}/>
                          <span>{item.text}</span>
                        </label>
                      ))}
                    </div>
                    <div className="decision-draft-btns">
                      <button className="decision-draft-cancel" onClick={() => addMoreDecisionOptions(task)} disabled={decisionDraftLoading}>
                        {decisionDraftLoading ? '...' : '➕ Add More'}
                      </button>
                      <button className="decision-draft-save" onClick={saveDecisionDraft}
                        disabled={!Array.isArray(decisionDraft) || !decisionDraft.some(i => i.checked)}>Save Checked</button>
                      <button className="decision-draft-cancel" onClick={() => { setDecisionDraft(null); setDecisionDraftQuestion(null); }}>Cancel</button>
                    </div>
                  </>
                : task.decisionOptions
                  ? <div className="decision-options">{task.decisionOptions}</div>
                  : <div className="decision-empty">No options set — tap ✨ AI Suggest or edit in task.</div>
              }
            </div>
            <div className="updates-list">
              {thread.messages.length === 0 && <div className="thread-empty">No updates yet. Add one below or run EOD.</div>}
              {thread.messages.map(m => (
                <div key={m.id} className={`update-entry ${m.source === 'eod' ? 'eod-source' : m.source === 'update' ? 'update-source' : m.source === 'ai' ? 'ai-source' : m.source === 'agenda' ? 'agenda-source' : ''}`}>
                  {m.source === 'ai'
                    ? <div className="update-text" dangerouslySetInnerHTML={{ __html: fmtHtml(m.content) }}/>
                    : <div className="update-text">{m.content}</div>
                  }
                  <div className="update-meta">
                    {fmtTime(m.timestamp)}
                    {m.source === 'eod'    && <span className="update-eod-tag">EOD</span>}
                    {m.source === 'update' && <span className="update-tag">UPDATE</span>}
                    {m.source === 'ai'     && <span className="update-ai-tag">AI ASSIST</span>}
                    {m.source === 'agenda' && <span className="update-tag" style={{background:'#fff8e7',color:'#b45309',borderColor:'#f59e0b'}}>AGENDA</span>}
                  </div>
                  {m.source === 'ai' && (
                    <button className="thread-copy-btn" onClick={() => { navigator.clipboard.writeText(m.content); setCopiedId(m.id); setTimeout(() => setCopiedId(null), 1500); }}>
                      {copiedId === m.id ? '✓ Copied' : '⎘ Copy'}
                    </button>
                  )}
                </div>
              ))}
            </div>
            {threadAiLoading && (
              <div className="update-entry ai-source" style={{ opacity: 0.7 }}>
                <div className="typing-dots"><span/><span/><span/></div>
              </div>
            )}
            </div>
            <div className="thread-bottom">
              <div className="thread-mode-row">
                <button className={`thread-mode-btn ${threadMode==='log' ? 'active' : ''}`} onClick={() => setThreadMode('log')}>📝 Log</button>
                <button className={`thread-mode-btn ${threadMode==='assist' ? 'active' : ''}`} onClick={() => setThreadMode('assist')}>✨ Assist</button>
              </div>
              <div className="thread-input-row">
                <textarea ref={threadTextareaRef} className="thread-textarea" value={threadInput} onChange={e => setThreadInput(e.target.value)}
                  placeholder={threadMode === 'assist' ? 'Ask AI about this task...' : 'Add an update...'}
                  rows={1}
                  onKeyDown={e => { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); threadMode === 'assist' ? handleThreadAssist(threadInput) : addUpdate(activeThread, threadInput); } }}/>
                <button className="send-btn" onClick={() => threadMode === 'assist' ? handleThreadAssist(threadInput) : addUpdate(activeThread, threadInput)} disabled={!threadInput.trim() || threadAiLoading}>
                  {threadAiLoading ? '…' : '+'}
                </button>
              </div>
              <div className="thread-mode-label">
                {threadMode === 'log' ? '📝 Log Mode' : '✨ AI Assist'}
              </div>
            </div>
          </div>
        );
      }

      const getLastUpdate = (id) => {
        const msgs = threads[id]?.messages;
        return msgs?.length ? new Date(msgs[msgs.length - 1].timestamp).getTime() : 0;
      };
      const sortDir = threadSort.dir === 'asc' ? 1 : -1;
      const sortedIds = Object.keys(tasks).sort((a, b) => {
        const ta = tasks[a], tb = tasks[b];
        if (threadSort.by === 'lastUpdate') return (getLastUpdate(a) - getLastUpdate(b)) * sortDir;
        if (threadSort.by === 'due') return (new Date(ta.dueDate||'9999-12-31') - new Date(tb.dueDate||'9999-12-31')) * sortDir;
        if (threadSort.by === 'status') {
          const o = { open:0, 'in-progress':1, decision:2, done:3 };
          return ((o[ta.status]||0) - (o[tb.status]||0)) * sortDir;
        }
        return 0;
      });
      const setSortBy = (key) => setThreadSort(prev =>
        prev.by === key ? { ...prev, dir: prev.dir === 'asc' ? 'desc' : 'asc' } : { by: key, dir: 'desc' }
      );

      return (
        <div>
          <div className="thread-sort-bar">
            <span className="thread-sort-label">Sort</span>
            {[['lastUpdate','Last Updated'],['due','Due Date'],['status','Status']].map(([key, label]) => (
              <button key={key} className={`thread-sort-btn ${threadSort.by===key ? 'active' : ''}`} onClick={() => setSortBy(key)}>
                {label}{threadSort.by===key ? (threadSort.dir==='desc' ? ' ↓' : ' ↑') : ''}
              </button>
            ))}
          </div>
          <div className="threads-list">
            {sortedIds.length === 0 && <div className="thread-empty">No threads yet. Tasks added to the board auto-create a thread.</div>}
            {sortedIds.map(id => {
              const task    = tasks[id];
              const thread  = threads[id] || { messages: [] };
              const updates = thread.messages?.length || 0;
              const lastTs  = thread.messages?.length ? thread.messages[thread.messages.length - 1].timestamp : null;
              const col     = categories.find(c => c.id === task.category);
              return (
                <div key={id} className="thread-card" onClick={() => setActiveThread(id)}>
                  <div className="thread-card-top">
                    <div className="thread-card-title">{task.title}</div>
                    <span className={`status-chip ${task.status}`} style={{ fontSize: 10, flexShrink: 0 }}>{STATUS_OPTIONS.find(s=>s.value===task.status)?.label||task.status}</span>
                  </div>
                  <div className="thread-card-meta">
                    {task.dueDate ? `Due ${fmtDate(task.dueDate)}` : 'No due date'}
                    {col && <span style={{ color: col.color, fontWeight: 600 }}> · {col.label}</span>}
                    {isOverdue(task.dueDate, task.status) && ' · ⚠️ Overdue'}
                  </div>
                  <div className="thread-card-footer">
                    <div style={{ display:'flex', alignItems:'center', gap:6 }}>
                      <span className="thread-update-chip">🧵 {updates} update{updates !== 1 ? 's' : ''}</span>
                      {task.email && (
                        <button className="gmail-card-btn"
                          onClick={e => { e.stopPropagation(); window.open(task.email, '_blank'); }}
                          title="Open in Gmail">
                          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" width="16" height="16">
                            <path fill="#4caf50" d="M45,16.2l-5,2.75l-5,4.75L35,40h7c1.657,0,3-1.343,3-3V16.2z"/>
                            <path fill="#1e88e5" d="M3,16.2l3.614,1.71L13,23.7V40H6c-1.657,0-3-1.343-3-3V16.2z"/>
                            <polygon fill="#e53935" points="35,11.2 24,19.45 13,11.2 12,17 13,23.7 24,31.95 35,23.7 36,17"/>
                            <path fill="#c62828" d="M3,12.298V16.2l10,7.5V11.2L9.876,8.859C9.132,8.301,8.228,8,7.298,8h0C4.924,8,3,9.924,3,12.298z"/>
                            <path fill="#fbc02d" d="M45,12.298V16.2l-10,7.5V11.2l3.124-2.341C38.868,8.301,39.772,8,40.702,8h0 C43.076,8,45,9.924,45,12.298z"/>
                          </svg>
                        </button>
                      )}
                    </div>
                    {lastTs && <span className="thread-last-update">{timeAgo(lastTs)}</span>}
                  </div>
                </div>
              );
            })}
          </div>
        </div>
      );
    };

    const renderNotifications = () => (
      <div>
        {notifications.length > 0 && (
          <div style={{ padding: '12px 14px 0' }}>
            <button className="clear-all-btn" onClick={() => { if (confirm('Clear all notifications?')) setNotifications([]); }}>Clear All</button>
          </div>
        )}
        <div className="notifs-wrap">
          {notifications.length === 0 && <div className="empty-state">No notifications yet.<br/>Run 📊 Generate EOD to create one.</div>}
          {notifications.map(n => (
            <div key={n.id} className={`notif-card ${n.read ? 'is-read' : ''}`}>
              <div className="notif-time">{fmtTime(n.timestamp)}</div>
              <div className="notif-body fmt" dangerouslySetInnerHTML={{ __html: fmtHtml(n.content) }}/>
              <div className="notif-actions">
                <button className={`notif-action-btn copy-btn ${copiedId === n.id ? 'copied' : ''}`} onClick={() => handleCopy(n.id, n.content)}>
                  {copiedId === n.id ? '✓ Copied!' : '📋 Copy Text'}
                </button>
                {!n.read && (
                  <button className="notif-action-btn" onClick={() => setNotifications(prev => prev.map(x => x.id === n.id ? {...x, read:true} : x))}>
                    Mark Read
                  </button>
                )}
              </div>
            </div>
          ))}
        </div>
      </div>
    );

    const renderSettings = () => {
      const costUsd = (tokens.input / 1e6 * 3) + (tokens.output / 1e6 * 15);
      return (
        <div className="settings-wrap">
          <button className="btn btn-primary" style={{width:'100%', marginBottom:16}} onClick={() => setShowHelp(true)}>
            📖 Help Guide & SOP
          </button>
          <div className="settings-section">
            <div className="settings-section-label">API Key</div>
            <div style={{ background: 'var(--surface)', borderRadius: 10, padding: '12px 14px', marginBottom: 6 }}>
              <div className="form-lbl" style={{ marginBottom: 8 }}>Anthropic API Key</div>
              <div className="api-key-row">
                <input type="password" className="api-key-inp" value={apiKeyDraft} onChange={e => setApiKeyDraft(e.target.value)}
                  placeholder="sk-ant-..." onKeyDown={e => { if (e.key === 'Enter') saveApiKey(); }}/>
                <button className="api-key-save" onClick={saveApiKey}>Save</button>
              </div>
              {apiKey && <div style={{ fontSize: 12, color: '#10b981', marginTop: 8, fontWeight: 600 }}>✓ Key saved</div>}
            </div>
          </div>

          <div className="settings-section">
            <div className="settings-section-label">Display</div>
            <div className="settings-row">
              <span className="settings-row-lbl">Dark Mode</span>
              <button className={`toggle-btn ${darkMode ? 'on' : 'off'}`} onClick={() => setDarkMode(p => !p)}/>
            </div>
          </div>

          <div className="settings-section">
            <div className="settings-section-label">AI Model</div>
            <div style={{ background: 'var(--surface)', borderRadius: 10, padding: '12px 14px' }}>
              <select className="settings-select" value={model} onChange={e => setModel(e.target.value)}>
                <option value="claude-sonnet-4-5">Claude Sonnet 4.5 (Recommended)</option>
                <option value="claude-opus-4-5">Claude Opus 4.5 (Powerful)</option>
                <option value="claude-haiku-4-5">Claude Haiku 4.5 (Fast)</option>
              </select>
            </div>
          </div>

          <div className="settings-section">
            <div className="settings-section-label">Usage</div>
            <div className="settings-row">
              <div>
                <div className="settings-row-lbl">AI Cost</div>
                <div style={{ fontSize: 11, color: 'var(--text2)', marginTop: 2 }}>{tokens.input.toLocaleString()} in · {tokens.output.toLocaleString()} out tokens</div>
              </div>
              <div style={{ textAlign: 'right', fontWeight: 600 }}>${costUsd.toFixed(4)}</div>
            </div>
            <button className="btn btn-ghost" style={{ fontSize: 12, padding: '7px 14px', marginTop: 2 }}
              onClick={() => { if (confirm('Reset cost counter?')) setTokens({ input: 0, output: 0 }); }}>
              Reset Counter
            </button>
          </div>

          <div className="settings-section">
            <div className="settings-section-label">Data</div>
            <div className="settings-row"><span className="settings-row-lbl">Tasks</span><span className="settings-row-val">{Object.keys(tasks).length}</span></div>
            <div className="settings-row"><span className="settings-row-lbl">Threads</span><span className="settings-row-val">{Object.keys(threads).length}</span></div>
            <div className="settings-row"><span className="settings-row-lbl">Notifications</span><span className="settings-row-val">{notifications.length}</span></div>
            <div style={{ marginTop: 8 }}>
              <button className="btn btn-danger" style={{ fontSize: 12, padding: '7px 14px', width: '100%' }}
                onClick={() => { if (confirm('Clear ALL data? Cannot be undone.')) { setTasks({}); setThreads({}); setChatHistory([]); setNotifications([]); setEodState(null); setUpdateTaskState(null); setTokens({ input:0, output:0 }); } }}>
                Clear All Data
              </button>
            </div>
          </div>
        </div>
      );
    };

    const tabs = [
      { id: 'chat',          label: 'Chat',     icon: '💬' },
      { id: 'board',         label: 'Board',    icon: '📋' },
      { id: 'threads',       label: 'Threads',  icon: '🧵' },
      { id: 'notifications', label: 'Notifs',   icon: '🔔', badge: unreadCount },
      { id: 'settings',      label: 'Settings', icon: '⚙️' }
    ];

    return (
      <div className="app">
        <div className="header">
          <h1>TMG Ops Log</h1>
        </div>
        <div className="tabbar">
          {tabs.map(t => (
            <button key={t.id} className={tab === t.id ? 'active' : ''}
              onClick={() => { setTab(t.id); if (t.id !== 'threads') setActiveThread(null); }}>
              <span className="tab-icon">
                {t.icon}
                {t.badge > 0 && <span className="tab-dot">{t.badge}</span>}
              </span>
              <span className="tab-label">{t.label}</span>
            </button>
          ))}
        </div>
        <div className="content">
          {tab === 'chat'          && renderChat()}
          {tab === 'board'         && renderBoard()}
          {tab === 'threads'       && renderThreads()}
          {tab === 'notifications' && renderNotifications()}
          {tab === 'settings'      && renderSettings()}
        </div>
        {editTask && <TaskModal task={editTask} categories={categories} onSave={saveTask} onDelete={deleteTask} onClose={() => setEditTask(null)}/>}
        {showCatSettings && <CategorySettingsModal categories={categories} onSave={saveCategories} onClose={() => setShowCatSettings(false)}/>}
        {showDecisionModal && activeThread && tasks[activeThread] && (
          <div className="overlay" onClick={e => { if (e.target.classList.contains('overlay')) { setShowDecisionModal(false); setDecisionDraft(null); setDecisionDraftQuestion(null); } }}>
            <div className="modal" style={{ maxHeight: '80vh' }}>
              <div className="modal-handle"/>
              <div className="modal-hdr">
                <span className="modal-hdr-title">🔮 Decision</span>
                <button className="icon-btn" onClick={() => { setShowDecisionModal(false); setDecisionDraft(null); setDecisionDraftQuestion(null); }}>×</button>
              </div>
              <div style={{ fontSize: 13, color: 'var(--text2)', marginBottom: 12 }}>
                {tasks[activeThread].decisionQuestion ? tasks[activeThread].decisionQuestion : <em>No decision question set on this task.</em>}
              </div>
              {decisionDraftLoading && (
                <div style={{ textAlign: 'center', padding: '20px 0', color: 'var(--text2)' }}>
                  <div className="typing-dots"><span/><span/><span/></div>
                  <div style={{ marginTop: 8, fontSize: 12 }}>Generating options…</div>
                </div>
              )}
              {!decisionDraftLoading && decisionDraft !== null && (
                <>
                  {decisionDraftQuestion && (
                    <label className="decision-checkbox-item" style={{ marginBottom: 10, paddingBottom: 10, borderBottom: '1px solid var(--border)' }}>
                      <input type="checkbox" checked={decisionDraftQuestion.use}
                        onChange={() => setDecisionDraftQuestion(prev => ({ ...prev, use: !prev.use }))}/>
                      <span><strong style={{ color: '#8b5cf6' }}>Question: </strong>{decisionDraftQuestion.text}</span>
                    </label>
                  )}
                  <div className="decision-checkbox-list">
                    {(Array.isArray(decisionDraft) ? decisionDraft : []).map((item, i) => (
                      <label key={i} className="decision-checkbox-item">
                        <input type="checkbox" checked={item.checked}
                          onChange={() => setDecisionDraft(prev => prev.map((it, idx) => idx === i ? { ...it, checked: !it.checked } : it))}/>
                        <span>{item.text}</span>
                      </label>
                    ))}
                  </div>
                  <div className="decision-draft-btns" style={{ marginTop: 14 }}>
                    <button className="decision-draft-cancel"
                      onClick={() => addMoreDecisionOptions(tasks[activeThread])}
                      disabled={decisionDraftLoading}>➕ Add More</button>
                    <button className="decision-draft-save"
                      onClick={() => { saveDecisionDraft(); setShowDecisionModal(false); }}
                      disabled={!Array.isArray(decisionDraft) || !decisionDraft.some(i => i.checked)}>Save Checked</button>
                    <button className="decision-draft-cancel"
                      onClick={() => { setShowDecisionModal(false); setDecisionDraft(null); setDecisionDraftQuestion(null); }}>Cancel</button>
                  </div>
                </>
              )}
            </div>
          </div>
        )}
        {showHelp && (
          <div className="overlay" onClick={e => { if (e.target.classList.contains('overlay')) setShowHelp(false); }}>
            <div className="modal" style={{maxHeight:'92vh'}}>
              <div className="modal-handle"/>
              <div className="modal-hdr">
                <span className="modal-hdr-title">📖 TMG Ops Log — Training Guide</span>
                <button className="icon-btn" onClick={() => setShowHelp(false)}>×</button>
              </div>
              <div style={{fontSize:13, lineHeight:1.65, color:'var(--text)', paddingBottom:8}} dangerouslySetInnerHTML={{__html: `
<p style="color:var(--text2);font-size:12px;margin-bottom:16px">Version 1.0 · For: The Morshed Group — All Team Members</p>

<h3 style="margin:0 0 6px;font-size:15px">1. What Is TMG Ops Log?</h3>
<p>TMG Ops Log is an internal operations tracking tool for managing tasks, logging updates, tracking decisions, and generating end-of-day (EOD) summaries — all powered by AI.</p>
<p style="margin-top:6px"><strong>Who uses it:</strong><br>
• <strong>Symon (Ops Manager)</strong> — Manages tasks, logs progress, generates EOD reports<br>
• <strong>Tarek (CEO)</strong> — Reads EOD notifications, makes decisions<br>
• <strong>Team members</strong> — View tasks, add thread updates, log accomplishments</p>

<hr style="border:none;border-top:1px solid var(--border);margin:14px 0"/>

<h3 style="margin:0 0 6px;font-size:15px">2. Getting Started</h3>
<p>Go to <strong>⚙️ Settings</strong> → enter your <strong>Anthropic API Key</strong> (sk-ant-...) → tap <strong>Save</strong>. Select your preferred AI model (Sonnet recommended).</p>

<hr style="border:none;border-top:1px solid var(--border);margin:14px 0"/>

<h3 style="margin:0 0 6px;font-size:15px">3. The 5 Tabs</h3>
<p>
💬 <strong>Chat</strong> — AI assistant, EOD, Agenda, quick actions<br>
📋 <strong>Board</strong> — Task board by category<br>
🧵 <strong>Threads</strong> — Full update history per task<br>
🔔 <strong>Notifs</strong> — EOD summaries and notifications<br>
⚙️ <strong>Settings</strong> — API key, model, dark mode, data</p>

<hr style="border:none;border-top:1px solid var(--border);margin:14px 0"/>

<h3 style="margin:0 0 6px;font-size:15px">4. Board — Managing Tasks</h3>
<p><strong>Create a task:</strong> Tap <strong>+ Add Task Manually</strong> on the Board, or type <code>Add task: [description]</code> in Chat.</p>
<p style="margin-top:8px"><strong>Task fields:</strong><br>
• <strong>Title</strong> — What needs to be done (required)<br>
• <strong>Category</strong> — Which column it belongs to<br>
• <strong>Due Date</strong> — When it's due (required)<br>
• <strong>Status</strong> — Open / In Progress / Decision / Done<br>
• <strong>Notes</strong> — Context or background<br>
• <strong>Decision Question</strong> — What needs to be decided?<br>
• <strong>Decision Options</strong> — Numbered choices<br>
• <strong>Decision Maker</strong> — Tarek or Symon (routes to correct EOD)<br>
• <strong>Email Link</strong> — URL to related email</p>

<hr style="border:none;border-top:1px solid var(--border);margin:14px 0"/>

<h3 style="margin:0 0 6px;font-size:15px">5. Threads — Tracking Updates</h3>
<p>Every task has a thread. Tap any task in Threads tab to see its full history.</p>
<p style="margin-top:8px"><strong>Update sources (color-coded):</strong><br>
🟠 <strong>EOD</strong> — Logged during EOD check-in<br>
🟢 <strong>UPDATE</strong> — Manually logged or via Update Task chat<br>
🔵 <strong>AI</strong> — AI Assist mode response<br>
🟡 <strong>AGENDA</strong> — Logged during Agenda check-in</p>
<p style="margin-top:8px"><strong>Log vs Assist mode:</strong> Use <strong>📝 Log</strong> to add a plain update. Use <strong>✨ Assist</strong> to chat with AI about the specific task.</p>
<p style="margin-top:8px"><strong>Decision Block:</strong> Use <strong>✨ AI Suggest</strong> to generate decision options. Tap <strong>➕ Add More</strong> to get additional options. Check the ones you want and tap <strong>Save Checked</strong>.</p>

<hr style="border:none;border-top:1px solid var(--border);margin:14px 0"/>

<h3 style="margin:0 0 6px;font-size:15px">6. Chat — Daily Workflows</h3>
<p><strong>Pill Button Reference:</strong></p>
<p>
🏆 <strong>Accomplishments</strong> — Log completed work as a Done task with today's date<br>
＋ <strong>Add Task</strong> — Create a task via AI<br>
✏️ <strong>Update Task</strong> — Route a quick update to the right task<br>
📋 <strong>Agenda</strong> — Morning check-in with action items per open task<br>
📊 <strong>EOD: Tarek</strong> — End-of-day report for Tarek<br>
📊 <strong>EOD: Symon</strong> — Personal end-of-day summary<br>
🗑️ <strong>Clear Chat</strong> — Clear chat history</p>

<hr style="border:none;border-top:1px solid var(--border);margin:14px 0"/>

<h3 style="margin:0 0 6px;font-size:15px">7. EOD Workflow (Step by Step)</h3>
<p><strong>1.</strong> Tap <strong>📊 EOD: Tarek</strong><br>
<strong>2.</strong> AI asks numbered questions for each open task<br>
<strong>3.</strong> Reply with numbered answers on one or multiple lines:<br>
<em>"1. Sent the proposal 2. Waiting on client feedback 3. Meeting confirmed"</em><br>
<strong>4.</strong> App logs each answer to the task thread<br>
<strong>5.</strong> EOD notification is generated in <strong>🔔 Notifs</strong> with 3 sections:<br>
&nbsp;&nbsp;• <strong>Accomplishments</strong> — Done tasks from today<br>
&nbsp;&nbsp;• <strong>Task Updates</strong> — All open tasks with your answers<br>
&nbsp;&nbsp;• <strong>Decisions Required</strong> — Tasks assigned to Tarek with A/B/C options</p>

<hr style="border:none;border-top:1px solid var(--border);margin:14px 0"/>

<h3 style="margin:0 0 6px;font-size:15px">8. Agenda Workflow (Step by Step)</h3>
<p><strong>1.</strong> Tap <strong>📋 Agenda</strong> (best used in the morning)<br>
<strong>2.</strong> AI generates numbered action items for each open task<br>
<strong>3.</strong> Reply with numbered answers:<br>
<em>"1. Done 2. Following up today 3. Scheduled for Thursday"</em><br>
<strong>4.</strong> Each answer is logged to the task thread with an AGENDA tag</p>

<hr style="border:none;border-top:1px solid var(--border);margin:14px 0"/>

<h3 style="margin:0 0 6px;font-size:15px">9. Accomplishments (Step by Step)</h3>
<p><strong>1.</strong> Tap <strong>🏆 Accomplishments</strong><br>
<strong>2.</strong> Type naturally: <em>"Accomplishment: Submitted lease renewal for Unit 302 — for downtown tower"</em><br>
<strong>3.</strong> AI creates a <strong>Done</strong> task with today's date, short title, and your context as notes<br>
<strong>4.</strong> It will appear in your next EOD's Accomplishments section</p>

<hr style="border:none;border-top:1px solid var(--border);margin:14px 0"/>

<h3 style="margin:0 0 6px;font-size:15px">10. Symon's Daily Routine</h3>
<p>☀️ <strong>Morning:</strong> Tap 📋 Agenda → reply with numbered status updates<br>
🔄 <strong>During day:</strong> Use ✏️ Update Task as things happen · Use 🏆 Accomplishments when you finish something<br>
🌙 <strong>End of day:</strong> Tap 📊 EOD: Tarek → reply with updates → check 🔔 Notifs</p>

<hr style="border:none;border-top:1px solid var(--border);margin:14px 0"/>

<h3 style="margin:0 0 6px;font-size:15px">11. Tarek's Reference</h3>
<p>1. Open <strong>🔔 Notifs</strong> to read EOD summaries<br>
2. Look for <strong>Decisions Required</strong> — reply to Symon with your choices (e.g., "Task 3: Option B")<br>
3. Use <strong>📋 Board</strong> to see all tasks at a glance<br>
4. Tap any task to open its thread and read full history</p>

<hr style="border:none;border-top:1px solid var(--border);margin:14px 0"/>

<h3 style="margin:0 0 6px;font-size:15px">12. Tips</h3>
<p>
• Set <strong>Decision Maker</strong> on tasks early — it routes decisions to the right EOD<br>
• Use <strong>voice input 🎤</strong> for quick hands-free updates<br>
• <strong>Overdue tasks</strong> show a ⚠️ warning — keep due dates current<br>
• <strong>Clear All Data</strong> in Settings is permanent — use with caution</p>
              `}}/>
            </div>
          </div>
        )}

      </div>
    );
  }

  ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
