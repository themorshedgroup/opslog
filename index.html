            <div style={{ background: 'var(--surface)', borderRadius: 10, padding: '12px 14px', marginBottom: 6 }}>
              <div className="form-lbl" style={{ marginBottom: 8 }}>Anthropic API Key</div>
              <div className="api-key-row">
                <input type="password" className="api-key-inp" value={apiKeyDraft} onChange={e => setApiKeyDraft(e.target.value)}
                  placeholder="sk-ant-..." onKeyDown={e => { if (e.key === 'Enter') saveApiKey(); }}/>
                <button className="api-key-save" onClick={saveApiKey}>Save</button>
              </div>
              {apiKey && <div style={{ fontSize: 12, color: '#10b981', marginTop: 8, fontWeight: 600 }}>✓ Key saved</div>}
            </div>
          </div>

          <div className="settings-section">
            <div className="settings-section-label">Display</div>
            <div className="settings-row">
              <span className="settings-row-lbl">Dark Mode</span>
              <button className={`toggle-btn ${darkMode ? 'on' : 'off'}`} onClick={() => setDarkMode(p => !p)}/>
            </div>
          </div>

          <div className="settings-section">
            <div className="settings-section-label">AI Model</div>
            <div style={{ background: 'var(--surface)', borderRadius: 10, padding: '12px 14px' }}>
              <select className="settings-select" value={model} onChange={e => setModel(e.target.value)}>
                <option value="claude-sonnet-4-5">Claude Sonnet 4.5 (Recommended)</option>
                <option value="claude-opus-4-5">Claude Opus 4.5 (Powerful)</option>
                <option value="claude-haiku-4-5">Claude Haiku 4.5 (Fast)</option>
              </select>
            </div>
          </div>

          <div className="settings-section">
            <div className="settings-section-label">Usage</div>
            <div className="settings-row">
              <div>
                <div className="settings-row-lbl">AI Cost</div>
                <div style={{ fontSize: 11, color: 'var(--text2)', marginTop: 2 }}>{tokens.input.toLocaleString()} in · {tokens.output.toLocaleString()} out tokens</div>
              </div>
              <div style={{ textAlign: 'right', fontWeight: 600 }}>${costUsd.toFixed(4)}</div>
            </div>
            <button className="btn btn-ghost" style={{ fontSize: 12, padding: '7px 14px', marginTop: 2 }}
              onClick={() => { if (confirm('Reset cost counter?')) setTokens({ input: 0, output: 0 }); }}>
              Reset Counter
            </button>
          </div>

          <div className="settings-section">
            <div className="settings-section-label">Data</div>
            <div className="settings-row"><span className="settings-row-lbl">Tasks</span><span className="settings-row-val">{Object.keys(tasks).length}</span></div>
            <div className="settings-row"><span className="settings-row-lbl">Threads</span><span className="settings-row-val">{Object.keys(threads).length}</span></div>
            <div className="settings-row"><span className="settings-row-lbl">Notifications</span><span className="settings-row-val">{notifications.length}</span></div>
            <div style={{ marginTop: 8 }}>
              <button className="btn btn-danger" style={{ fontSize: 12, padding: '7px 14px', width: '100%' }}
                onClick={() => { if (confirm('Clear ALL data? Cannot be undone.')) { setTasks({}); setThreads({}); setChatHistory([]); setNotifications([]); setEodState(null); setUpdateTaskState(null); setTokens({ input:0, output:0 }); } }}>
                Clear All Data
              </button>
            </div>
          </div>
        </div>
      );
    };

    const tabs = [
      { id: 'chat',          label: 'Chat',     icon: '💬' },
      { id: 'board',         label: 'Board',    icon: '📋' },
      { id: 'threads',       label: 'Threads',  icon: '🧵' },
      { id: 'notifications', label: 'Notifs',   icon: '🔔', badge: unreadCount },
      { id: 'settings',      label: 'Settings', icon: '⚙️' }
    ];

    return (
      <div className="app">
        <div className="header">
          <h1>TMG Ops Log</h1>
        </div>
        <div className="tabbar">
          {tabs.map(t => (
            <button key={t.id} className={tab === t.id ? 'active' : ''}
              onClick={() => { setTab(t.id); if (t.id !== 'threads') setActiveThread(null); }}>
              <span className="tab-icon">
                {t.icon}
                {t.badge > 0 && <span className="tab-dot">{t.badge}</span>}
              </span>
              <span className="tab-label">{t.label}</span>
            </button>
          ))}
        </div>
        <div className="content">
          {tab === 'chat'          && renderChat()}
          {tab === 'board'         && renderBoard()}
          {tab === 'threads'       && renderThreads()}
          {tab === 'notifications' && renderNotifications()}
          {tab === 'settings'      && renderSettings()}
        </div>
        {editTask && <TaskModal task={editTask} categories={categories} onSave={saveTask} onDelete={deleteTask} onClose={() => setEditTask(null)}/>}
        {showCatSettings && <CategorySettingsModal categories={categories} onSave={saveCategories} onClose={() => setShowCatSettings(false)}/>}
      </div>
    );
  }

  ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
